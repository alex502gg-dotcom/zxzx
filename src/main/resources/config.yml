# =====================================================
#  TrapKit — конфигурация
# =====================================================

item:
  # Предмет, который выдаётся командой /trap give
  material: TRIPWIRE_HOOK
  name: "&c&lЛовушка"
  lore:
    - "&7ПКМ по игроку,"
    - "&7чтобы заключить его в ловушку"

trap:
  # Сколько секунд комната будет существовать перед тем,
  # как полностью исчезнуть (мир вернётся в исходное состояние)
  duration-seconds: 10

  # Размер полого пространства внутри ловушки (где реально стоит игрок).
  # 3 = внутри получается комната 3x3x3, в которой можно свободно стоять.
  # Рекомендуется нечётное число (3, 5, 7...), чтобы игрок был ровно в центре.
  interior-size: 3

  # Толщина декоративной оболочки (стен/пола/потолка) вокруг полой зоны.
  wall-thickness: 1

  # Материалы оболочки комнаты
  materials:
    corner: CHISELED_POLISHED_BLACKSTONE
    wall: POLISHED_BLACKSTONE
    stair: POLISHED_BLACKSTONE_STAIRS

messages:
  prefix: "&8[&cTrap&8] &r"
  usage: "&cИспользование: /trap give <игрок> <количество>"
  no-permission: "&cУ вас нет прав на это действие."
  player-not-found: "&cИгрок не найден."
  give-success: "&aВы выдали &f%amount%x &aпредмет &f%item% &aигроку &f%player%&a."
  give-received: "&aВы получили &f%amount%x &aЛовушка."
  trapped: "&cВы попали в ловушку! Она исчезнет через несколько секунд."
  trapped-other: "&aИгрок &f%player% &aпойман в ловушку!"
