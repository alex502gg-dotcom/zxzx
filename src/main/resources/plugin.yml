name: TrapKit
version: 1.0.0
main: ru.trapkit.trap.TrapPlugin
api-version: '1.21'
author: Claude
description: Плагин ловушек — комната 3х3х3, которая исчезает без следа.

commands:
  trap:
    description: Управление ловушками
    usage: /trap give <игрок> <количество>
    permission: trap.command
    permission-message: "§cУ вас нет прав на эту команду."

permissions:
  trap.command:
    description: Доступ к команде /trap
    default: op
  trap.give:
    description: Возможность выдавать ловушки другим игрокам
    default: op
